# See claude code environment variables documents at https://code.claude.com/docs/en/settings
[env]
# =============================================================================
# Environment Variable Strategy
# =============================================================================
# This file is the single source of truth for env vars in LOCAL development.
# For CI strategy (how these vars are handled in GitHub Actions), see:
#   .github/workflows/main.yml — top-level comments explain tool ownership
#   and how mise-action (env: true) exports these vars into the CI environment.
#
# Pattern for sensitive vars: tera template checks the env var first (CI injects
# it via GitHub Secrets), falls back to hst get from ~/home_secret.toml locally.
#   {% raw %}{{{% endraw %} env.VAR | default(value=exec(command='uvx --from home-secret-toml hst get <path>')) {% raw %}}}{% endraw %}
# =============================================================================

# Sensitive Values — fetched from ~/home_secret.toml via hst (home-secret-toml).
# See: https://pypi.org/project/home-secret-toml/
# `uvx --from home-secret-toml hst get <path>` reads a value from the local
# secret store without installing hst permanently into the project environment.
GITHUB_TOKEN = "{% raw %}{{{% endraw %} env.GITHUB_TOKEN | default(value=exec(command='uvx --from home-secret-toml hst get {{ cookiecutter.github_token_field }}')) {% raw %}}}{% endraw %}"
CLOUDFLARE_API_TOKEN = "{% raw %}{{{% endraw %} env.CLOUDFLARE_API_TOKEN | default(value=exec(command='uvx --from home-secret-toml hst get {{ cookiecutter.cloudflare_token_field }}')) {% raw %}}}{% endraw %}"

# Non-Sensitive Values
# AWS account ID for the DevOps account - set as GitHub Actions secret for CI/CD
DEVOPS_AWS_ACCOUNT_ID = "{{ cookiecutter.aws_account_id }}"
# S3 doc hosting configuration - used by deploy-versioned-doc / deploy-latest-doc / view-latest-doc
DOC_HOST_AWS_PROFILE = "{{ cookiecutter.doc_host_aws_profile }}"
DOC_HOST_S3_BUCKET = "{{ cookiecutter.doc_host_s3_bucket }}"
# AWS CodeArtifact configuration - used by .mise/tasks/codeartifact-env.sh
AWS_CODEARTIFACT_PROFILE = "{{ cookiecutter.aws_codeartifact_profile }}"
AWS_CODEARTIFACT_REGION = "{{ cookiecutter.aws_region }}"
AWS_CODEARTIFACT_DOMAIN_OWNER = "{{ cookiecutter.aws_account_id }}"
AWS_CODEARTIFACT_DOMAIN = "{{ cookiecutter.aws_codeartifact_domain }}"
AWS_CODEARTIFACT_REPO = "{{ cookiecutter.aws_codeartifact_repository }}"

[tools]
python = "{{ cookiecutter.dev_python_version }}"
uv = "latest"
claude = "latest"
pandoc = "3.9" # Use pandoc 3.9 - latest stable major version as of 2026-04
awscli = "2"
node = "24"
"npm:wrangler" = "latest"

# === Tasks ===
# Python Environment Management
[tasks.venv-create]
description = "🐍 Create Python virtual environment using uv (creates .venv directory)"
run = "uv venv --allow-existing"

[tasks.venv-remove]
description = "🗑️ Remove Python virtual environment (deletes .venv directory)"
run = "rm -r .venv"

# Dependency Management
# WARNING: This task requires AWS CodeArtifact authentication (network + AWS credentials).
# It is intentionally heavy and should NOT be a dependency of other tasks.
# Run it explicitly when: cloning the repo, or after changing pyproject.toml dependencies.
# Other tasks (test, cov, build-doc, etc.) assume the venv is already set up.
[tasks.inst]
description = "💾 Install all Python dependencies using uv (syncs from pyproject.toml and uv.lock)"
depends = ["venv-create"]
run = """
. .mise/tasks/codeartifact-env.sh
uv sync --all-extras
"""

[tasks.export]
description = "📋 Export Python dependencies to requirements*.txt files using uv (for legacy compatibility)"
run = """
uv export --format requirements-txt --no-dev --no-emit-project --no-hashes --no-annotate --no-emit-package pywin32 --no-emit-package colorama --no-emit-package tzdata | sed 's/ ; platform_machine ==.*or.*//' > requirements.txt
uv export --format requirements-txt --extra dev --no-emit-project --no-hashes --no-annotate --no-emit-package pywin32 --no-emit-package colorama --no-emit-package tzdata | sed 's/ ; platform_machine ==.*or.*//' > requirements-dev.txt
uv export --format requirements-txt --extra test --no-emit-project --no-hashes --no-annotate --no-emit-package pywin32 --no-emit-package colorama --no-emit-package tzdata | sed 's/ ; platform_machine ==.*or.*//' > requirements-test.txt
uv export --format requirements-txt --extra doc --no-emit-project --no-hashes --no-annotate --no-emit-package pywin32 --no-emit-package colorama --no-emit-package tzdata | sed 's/ ; platform_machine ==.*or.*//' > requirements-doc.txt
uv export --format requirements-txt --extra mise --no-emit-project --no-hashes --no-annotate --no-emit-package pywin32 --no-emit-package colorama --no-emit-package tzdata | sed 's/ ; platform_machine ==.*or.*//' > requirements-mise.txt
"""

# Testing
[tasks.test]
description = "🧪 Run unit tests using pytest (scans test files automatically)"
run = ".venv/bin/pytest tests"

[tasks.cov]
description = "🧪📊 Run unit tests with code coverage using pytest (generates HTML report in htmlcov/)"
run = ".venv/bin/pytest tests -s --tb=native --cov={{ cookiecutter.package_name }} --cov-report term-missing --cov-report html:htmlcov"

[tasks.view-cov]
description = "👀📊 Open code coverage HTML report in browser (requires 'cov' task to run first)"
run = "open htmlcov/index.html"

# Documentation
[tasks.build-doc]
description = "📚 Build Sphinx documentation using sphinx-build (generates HTML in docs/build/html/)"
run = ".venv/bin/sphinx-build -b html docs/source docs/build/html"

[tasks.view-doc]
description = "👀📚 Open built Sphinx documentation in browser (requires 'build-doc' task to run first)"
run = "open docs/build/html/index.html"

[tasks.deploy-versioned-doc]
description = "☁️ Deploy versioned documentation to AWS S3 (requires build-doc first)"
run = ".venv/bin/python .mise/tasks/deploy-versioned-doc.py"

[tasks.deploy-latest-doc]
description = "☁️ Deploy latest documentation to AWS S3 (requires build-doc first)"
run = ".venv/bin/python .mise/tasks/deploy-latest-doc.py"

[tasks.view-latest-doc]
description = "👀☁️ Open the latest documentation hosted on AWS S3 in browser"
run = ".venv/bin/python .mise/tasks/view-latest-doc.py"

[tasks.notebook-to-markdown]
description = "📓 Convert Jupyter notebooks to Markdown for AI knowledge base (processes .ipynb files)"
run = ".venv/bin/python .mise/tasks/notebook-to-markdown.py"

# Building & Publishing & Release
[tasks.build]
description = "🏗️ Build Python package wheel and source distribution using uv (outputs to dist/)"
run = """
rm -rf dist
uv build
"""

[tasks.publish]
description = "🚀 Publish Python package to AWS CodeArtifact using uv"
run = """
. .mise/tasks/codeartifact-env.sh
export UV_PUBLISH_USERNAME=$UV_INDEX_ESC_USERNAME
export UV_PUBLISH_PASSWORD=$UV_INDEX_ESC_PASSWORD
.venv/bin/python .mise/tasks/publish.py
uv publish --publish-url "https://${AWS_CODEARTIFACT_DOMAIN}-${AWS_CODEARTIFACT_DOMAIN_OWNER}.d.codeartifact.${AWS_CODEARTIFACT_REGION}.amazonaws.com/pypi/${AWS_CODEARTIFACT_REPO}/"
"""
depends = ["build"]

[tasks.release]
description = "🏷 Create GitHub release using PyGithub (idempotent: skips if release exists)"
run = ".venv/bin/python .mise/tasks/release.py"

[tasks.remove-pkg-version]
description = "🗑️ Remove the current package version (from pyproject.toml) from AWS CodeArtifact (destructive, requires confirmation)"
run = ".venv/bin/python .mise/tasks/remove.py"

# CI/CD Setup
[tasks.setup-github-secrets]
description = "🔑 Set required AWS account ID as GitHub Actions secret (run once during initial setup)"
run = ".venv/bin/python .mise/tasks/setup-github-secrets.py"

[tasks.update-github-metadata]
description = "🔧 Update GitHub repository description and homepage using PyGithub"
run = ".venv/bin/python .mise/tasks/update-github-metadata.py"

# Cloudflare Pages
[tasks.setup-cloudflare-token]
description = "🔑 Set Cloudflare API token as GitHub Actions secret (run once during initial setup)"
run = ".venv/bin/python .mise/tasks/setup-cloudflare-token.py"

[tasks.create-pages-project]
description = "☁️ Create Cloudflare Pages project (run once during initial setup)"
run = ".venv/bin/python .mise/tasks/create-pages-project.py"

[tasks.deploy-pages]
description = "🚀 Deploy documentation site to Cloudflare Pages (requires build-doc to run first)"
run = ".venv/bin/python .mise/tasks/deploy-pages.py"
